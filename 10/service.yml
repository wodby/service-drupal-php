name: drupal10-php
type: service
from: php
fromVersionConstraint: "^1.0.0"
fromVersion: "1.0.1"
title: PHP (Drupal 10)
labels:
- drupal
- drupal10

options:
- version: '8.1'
  tag: 8.1-4.77.3
- version: '8.2'
  tag: 8.2-4.82.1
- version: '8.3'
  tag: 8.3-4.82.1
- version: '8.4'
  default: true
  tag: 8.4-4.82.1
links:
- name: files
  title: Files storage
  required: true
  selectors:
  - type: storage
- name: solr
  title: Solr
  env:
  - name: SOLR_CLOUD_SERVER
    value: '{{link.host}}'
  - name: SOLR_CLOUD_PASSWORD
    value: '{{link.tokens.password}}'
    secret: true
  selectors:
  - type: search
    labels:
    - solr
- name: redis
  title: Redis
  env:
  - name: REDIS_PORT
    value: '{{link.port}}'
  - name: REDIS_HOST
    value: '{{link.host}}'
  - name: REDIS_PASSWORD
    value: '{{link.tokens.password}}'
    secret: true
  selectors:
  - type: datastore
    labels:
    - redis
  - type: datastore
    labels:
    - valkey

volumes:
- name: files
  title: Files
  shared: true
  size: 10
  link: files
  path: /mnt/files
  import:
    owner: 82
    group: 82

cron:
- name: drush
  title: drush cron
  command: drush -r ${HTTP_ROOT} -l ${WODBY_PRIMARY_URL} cron
  schedule: 0 0 * * *

env:
- name: DRUPAL_FILES_SYNC_SALT
  value: '{{sync_salt}}'
  secret: true
- name: DRUPAL_HASH_SALT
  value: '{{hash_salt}}'
  secret: true
- name: DRUPAL_VERSION
  value: '10'
  build: true
- name: HTTP_ROOT
  value: "${APP_ROOT}/${DOCROOT_SUBDIR}"

build:
  dockerfile: Dockerfile
  connect: true
  templates:
  - name: vanilla
    title: Vanilla Drupal
    repo: https://github.com/wodby/drupal-vanilla
    branch: 10.x

settings:
- name: docroot
  title: Drupal root subdirectory
  description: Composer-based projects have Drupal under 'web' directory by 
    default
  placeholder: path/relative/to/git/root
  default: web
  var: DOCROOT_SUBDIR
  build: true
- name: sitedir
  title: Drupal site dir
  required: true
  default: default
  var: DRUPAL_SITE
  build: true

tokens:
- name: sync_salt
  generate:
    regex: '[0-9a-z]{32}'
- name: hash_salt
  generate:
    regex: '[0-9a-z]{32}'

actions:
- name: clear_cache
  args: ['drush', 'cr']
  type: button
  title: Rebuild all cache
- name: user_login
  args: ['make', 'user-login']
  type: button
  title: Generate one-time login link
  privileged: true
- name: updb
  args: ['drush', 'updb']
  type: button
  title: Apply pending database updates

workloads:
- name: main
  selector:
    matchLabels:
      app.kubernetes.io/instance: '{{helm.release}}'
  kind: deployment
  primary: true
  containers:
  - name: php
    image: wodby/drupal-php
    build: true
